<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/mainstyle.css">
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <a href="/" class="nav-title">열린마당</a>
    </div>

    <div class="nav-right">
        {% if session.get('user_name') %}
        <a href="/mypage" class="nav-item">마이페이지</a>
        {% endif %}

        <a href="/analysis" class="nav-item">분석 게시판</a>

        {% if request.path == '/login' %}
        <a href="/join" class="nav-item">회원가입</a>
        {% elif request.path == '/join' %}
        <a href="/login" class="nav-item">로그인</a>
        {% endif %}
    </div>
</div>

<div class="hero-container">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="register-card">
            <h2 class="register-title"><a href="/" style="text-decoration: none; color: inherit;">LOGIN</a></h2>

            <form action="/login" method="POST" class="register-form">
                <div class="input-group">
                    <label for="uid">아이디</label>
                    <input type="text" id="uid" name="uid" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="submit" class="hero-btn register-submit">로그인하기</button>
            </form>

            <p class="login-link">계정이 없으신가요? <a href="/join">회원가입</a></p>
        </div>
    </div>
</div>
</body>
</html>
