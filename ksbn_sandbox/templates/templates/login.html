{% extends "menu_layout.html" %}

{% block content %}
<div class="hero-container">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="register-card">
            <h2 class="register-title">
                <a href="/" style="text-decoration: none; color: inherit;">LOGIN</a>
            </h2>

            <form action="/login" method="POST" class="register-form">
                <div class="input-group">
                    <label for="uid">아이디</label>
                    <input type="text" id="uid" name="uid" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="pw" placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="submit" class="hero-btn register-submit" style="width: 100%; border: none; margin-top: 10px;">
                    로그인하기
                </button>
            </form>

            <p class="login-link" style="margin-top: 20px; text-align: center; color: rgba(255,255,255,0.6);">
                계정이 없으신가요? <a href="/join" style="color: white; font-weight: bold; text-decoration: none;">회원가입</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
