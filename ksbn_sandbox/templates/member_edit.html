{% extends "menu_layout.html" %}

{% block content %}

<div class="hero-container">
    <div class="hero-overlay"></div>
    <div class="hero-content">

        <div class="register-card">
            <h2 class="register-title"><a href="/" style="text-decoration: none; color: inherit;">정보 수정</a></h2>
            <form action="/member/edit" method="POST">
                <div class="input-group">
                    <label>새 아이디</label>
                    <input type="text" name="new_uid" placeholder="변경할 아이디">
                </div>
                <div class="input-group">
                    <label>새 이름(닉네임)</label>
                    <input type="text" name="new_name" placeholder="새 이름" value="변경할 이름">
                </div>
                <div class="input-group">
                    <label>새 비밀번호</label>
                    <input type="password" name="pw" placeholder="변경할 비밀번호">
                </div>
                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" name="email" value="변경할 이메일 주소">
                </div>
                <button type="submit" class="hero-btn register-submit">수정 완료</button>
            </form>
        </div>

        <div class="delete-container">
            <p>계정을 삭제하시겠습니까?</p>
            <a href="/member/delete/{{ session.get('user_id') }}"
               class="btn-delete"
               onclick="return confirm('정말 탈퇴하시겠습니까?');">
                회원 탈퇴
            </a>
        </div>

    </div>
</div>
</body>
</html>

{% endblock %}
