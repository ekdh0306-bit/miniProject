{% extends "menu_layout.html" %}

{% block content %}

<div id="custom-context-menu"
     style="display: none; position: absolute; z-index: 1000; background: #2c2c2c; border: 1px solid #00d1b2; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <div onclick="removeSelectedFile()"
         style="padding: 12px 20px; color: white; cursor: pointer; font-size: 0.9rem; transition: 0.2s;"
         onmouseover="this.style.background='#00d1b2'; this.style.color='black';"
         onmouseout="this.style.background='transparent'; this.style.color='white';">
        🗑️ 파일 삭제하기
    </div>
</div>

<div class="hero-container">
    <div class="hero-overlay"></div>
    <div class="hero-content" style="width: 100%; max-width: 1400px; padding-top: 120px;">
        <div class="main-analyzer-container">
            <div class="register-card" style="flex: 1; min-width: 350px; margin: 0; padding: 30px;">
                <h3 class="register-title" style="font-size: 1.5rem;">데이터 업로드</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button type="button" class="hero-btn type-tab active" id="tab-image"
                            onclick="toggleUploadType('image')" style="flex:1;">📸 이미지
                    </button>
                    <button type="button" class="hero-btn type-tab" id="tab-video" onclick="toggleUploadType('video')"
                            style="flex:1;">🎥 영상
                    </button>
                </div>

                <form id="uploadForm">
                    <div id="image-section">
                        <div class="input-group">
                            <input type="file" name="image_file" id="imageInput" accept="image/*"
                                   onchange="previewFile('image')" style="display: none;">
                            <label for="imageInput" class="hero-btn">이미지 선택</label>
                        </div>
                        <div id="imagePreview" class="preview-box">
                            <p style="color: rgba(255,255,255,0.3);">이미지 미리보기</p>
                        </div>
                    </div>

                    <div id="video-section" style="display: none;">
                        <div class="input-group">
                            <input type="file" name="video_file" id="videoInput" accept="video/*"
                                   onchange="previewFile('video')" style="display: none;">
                            <label for="videoInput" class="hero-btn"
                                   style="width:100%; background:rgba(255,255,255,0.1);">영상 선택</label>
                        </div>
                        <div id="videoPreview" class="preview-box">
                            <p style="color: rgba(255,255,255,0.3);">영상 미리보기</p>
                        </div>
                    </div>

                    <div class="input-group"
                         style="margin-top: 20px; display: flex; flex-direction: column; align-items: flex-start;">
                        <label style="color: rgba(255, 255, 255, 0.6); margin-bottom: 10px; font-size: 0.85rem;">📝
                            메모</label>
                        <textarea name="description" id="description" placeholder="분석할 내용에 대한 설명을 입력하세요..."
                                  style="width: 100%; min-height: 120px; padding: 14px; background: rgba(255, 255, 255, 0.1);
                     border: 1px solid rgba(255, 255, 255, 0.2); color: white; border-radius: 12px;
                     resize: none; outline: none; font-family: 'Pretendard', sans-serif;"></textarea>
                    </div>

                    <button type="button" onclick="uploadFileWithProgress()" class="hero-btn"
                            style="width: 100%; margin-top: 20px; background: #00d1b2; color: black; border: none;">분석
                        시작
                    </button>
                </form>
            </div>

            <div class="register-card"
                 style="flex: 2; min-width: 600px; margin: 0; background: rgba(255,255,255,0.05); padding: 30px;">
                <h2 class="register-title" style="color: #00d1b2;">파일 분석 결과</h2>

                <div id="result-placeholder"
                     style="height: 400px; display: flex; justify-content: center; align-items: center; border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px;">
                    <p style="color: rgba(255,255,255,0.4); font-size: 1.2rem;">왼쪽에서 파일을 업로드하면 분석이 시작됩니다.</p>
                </div>

                <div id="loading-spinner"
                     style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 400px;">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px; color: #00d1b2; font-weight: bold; font-size: 1.2rem;">AI가 분석
                        중입니다...</p>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">잠시만 기다려 주세요.</p>
                </div>

                <div id="result-content" style="display: none;">
                    <div class="status-header" style="margin-bottom: 20px;">
                        <label style="font-size: 1.2rem; color: #00d1b2; font-weight: bold;">
                            📊 분석 상태: <span id="res-status" style="color:white; margin-left:10px;">완료</span>
                        </label>
                    </div>
                    <div id="res-detail"
                         style="background: rgba(0,0,0,0.4); padding: 25px; border-radius: 15px; min-height: 250px; color: #eee; font-size: 1.1rem; line-height: 1.6; border: 1px solid rgba(0,209,178,0.2); overflow-y: auto;">
                    </div>

                    <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 20px; font-size: 0.9rem;">
                        ※ 위 내용은 AI 분석 결과이며 실제와 다를 수 있습니다.
                    </p>

                    <div style="display: flex; justify-content: center; margin-top: 15px;">
                        <button type="button" class="hero-btn" onclick="goToDetailPage()" style="min-width: 200px;">자세히
                            보기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentType = 'image';

    function toggleUploadType(type) {
        currentType = type;
        document.getElementById('image-section').style.display = type === 'image' ? 'block' : 'none';
        document.getElementById('video-section').style.display = type === 'video' ? 'block' : 'none';
        document.getElementById('tab-image').classList.toggle('active', type === 'image');
        document.getElementById('tab-video').classList.toggle('active', type === 'video');
    }

    function previewFile(type) {
        const input = document.getElementById(type + 'Input');
        const preview = document.getElementById(type + 'Preview');
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = type === 'image' ? `<img src="${e.target.result}">` : `<video src="${e.target.result}" controls></video>`;
            };
            reader.readAsDataURL(file);
        }
    }

    function uploadFileWithProgress() {
        const fileInput = document.getElementById(currentType + 'Input');
        if (!fileInput.files[0]) return alert("파일을 선택해주세요!");

        const placeholder = document.getElementById('result-placeholder');
        const spinner = document.getElementById('loading-spinner');
        const resultContent = document.getElementById('result-content');

        // UI 전환: 로딩 시작
        placeholder.style.display = 'none';
        resultContent.style.display = 'none';
        spinner.style.display = 'flex';

        const formData = new FormData(document.getElementById('uploadForm'));
        if (currentType === 'image') formData.delete('video_file');
        else formData.delete('image_file');

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/analyze/result', true);

xhr.onload = function() {
    spinner.style.display = 'none';
    if (xhr.status === 200) {
        try {
            const response = JSON.parse(xhr.responseText);
            if (response.status === 'success' && response.media_id) {
                // 분석에 성공하고 media_id가 반환된 경우, 해당 상세 페이지로 이동합니다.
                // 이 로직은 사용자가 분석 결과를 즉시 확인하고 다음 행동으로 자연스럽게 이어지도록 돕습니다.
                window.location.href = '/analyze/analysis/' + response.media_id;
            } else {
                // 서버에서 'success' 상태가 아니거나 media_id가 없는 경우,
                // 사용자에게 실패 메시지를 명확하게 전달합니다.
                placeholder.style.display = 'flex';
                alert(response.message || "분석 결과를 가져오는 데 실패했습니다.");
            }
        } catch (e) {
            console.error("결과 처리 중 에러:", e);
            placeholder.style.display = 'flex';
            alert("응답 데이터를 처리하는 중 오류가 발생했습니다.");
        }
    } else {
        // 서버 연결 자체가 실패한 경우, 네트워크 상태나 서버 상태를 확인할 수 있도록
        // HTTP 상태 코드와 함께 에러 메시지를 표시합니다.
        placeholder.style.display = 'flex';
        alert("서버 연결 실패 (에러 코드: " + xhr.status + ")");
    }
};

        xhr.onerror = function() {
            spinner.style.display = 'none';
            placeholder.style.display = 'flex';
            alert("네트워크 오류 발생");
        };

        xhr.send(formData);
    }

    // 우클릭 및 기타 함수들...
    const contextMenu = document.getElementById('custom-context-menu');
    document.addEventListener('contextmenu', e => {
        const previewBox = e.target.closest('.preview-box');
        if (previewBox) {
            e.preventDefault();
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
        } else contextMenu.style.display = 'none';
    });
    document.addEventListener('click', () => contextMenu.style.display = 'none');

    function removeSelectedFile() {
        const type = currentType;
        document.getElementById(type + 'Input').value = "";
        document.getElementById(type + 'Preview').innerHTML = `<p style="color: rgba(255,255,255,0.3);">${type === 'image' ? '이미지' : '영상'} 미리보기</p>`;
    }

    function goToDetailPage() {
    const previewId = currentType === 'image' ? 'imagePreview' : 'videoPreview';
    const mediaElement = document.querySelector(`#${previewId} img, #${previewId} video`);

    // 💡 에러 방지: 분석 결과창의 텍스트를 가져오기
    const resDetail = document.getElementById('res-detail');
    const resultText = resDetail ? resDetail.innerText.trim() : "";

    if (!mediaElement || !resultText || resultText === "" || resultText === "분석 내용이 없습니다.") {
        return alert("분석 완료 후 이용 가능합니다.");
    }

    const memoInput = document.getElementById('description');

    const data = {
        type: currentType,
        mediaSrc: mediaElement.src,
        memo: memoInput ? memoInput.value : "",
        result: resultText
    };

    console.log("상세 페이지로 보낼 데이터:", data); // 디버깅용

    try {
        localStorage.setItem('temp_analysis_data', JSON.stringify(data));
        // 💡 서버 라우트 경로와 일치시킴! (/analyze/analysis 인지 확인하세요)
        location.href = '/analyze/analysis';
    } catch (e) {
        console.error("저장 실패:", e);
        alert("데이터 저장 중 오류가 발생했습니다.");
    }
}
</script>

{% endblock %}
