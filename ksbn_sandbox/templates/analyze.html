{% extends "menu_layout.html" %}

{% block content %}

<div id="custom-context-menu"
     style="display: none; position: absolute; z-index: 1000; background: #2c2c2c; border: 1px solid #00d1b2; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <div onclick="removeSelectedFile()"
         style="padding: 12px 20px; color: white; cursor: pointer; font-size: 0.9rem; transition: 0.2s;"
         onmouseover="this.style.background='#00d1b2'; this.style.color='black';"
         onmouseout="this.style.background='transparent'; this.style.color='white';">
        🗑️ 파일 삭제하기
    </div>
</div>

<div class="hero-container">
    <div class="hero-overlay"></div>
    <div class="hero-content" style="width: 100%; max-width: 1400px; padding-top: 120px;">
        <div class="main-analyzer-container">
            <div class="register-card" style="flex: 1; min-width: 350px; margin: 0; padding: 30px;">
                <h3 class="register-title" style="font-size: 1.5rem;">데이터 업로드</h3>

                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button type="button" class="hero-btn type-tab active" id="tab-image"
                            onclick="toggleUploadType('image')" style="flex:1;">📸 이미지
                    </button>
                    <button type="button" class="hero-btn type-tab" id="tab-video" onclick="toggleUploadType('video')"
                            style="flex:1;">🎥 영상
                    </button>
                </div>


                <form id="uploadForm">
                    <div id="image-section">
                        <div class="input-group">
                            <input type="file" name="image_file" id="imageInput" accept="image/*"
                                   onchange="previewFile('image')" style="display: none;">
                            <label for="imageInput" class="hero-btn">이미지 선택</label>
                        </div>
                        <div id="imagePreview" class="preview-box">
                            <p style="color: rgba(255,255,255,0.3);">이미지 미리보기</p>
                        </div>
                    </div>

                    <div id="video-section" style="display: none;">
                        <div class="input-group">
                            <input type="file" name="video_file" id="videoInput" accept="video/*"
                                   onchange="previewFile('video')" style="display: none;">
                            <label for="videoInput" class="hero-btn"
                                   style="width:100%; background:rgba(255,255,255,0.1);">영상 선택</label>
                        </div>
                        <div id="videoPreview" class="preview-box">
                            <p style="color: rgba(255,255,255,0.3);">영상 미리보기</p>
                        </div>
                    </div>

                    <div class="input-group" style="margin-top: 20px;">
                        <label>메모</label>
                        <input type="text" name="description" id="description" placeholder="설명 입력...">
                    </div>

                    <button type="button" onclick="uploadFileWithProgress()" class="hero-btn"
                            style="width: 100%; margin-top: 20px; background: #00d1b2; color: black; border: none;">
                        분석 시작
                    </button>
                </form>
            </div>

            <div class="register-card"
                 style="flex: 2; min-width: 600px; margin: 0; background: rgba(255,255,255,0.05);">
                <h2 class="register-title" style="color: #00d1b2;">파일 분석 결과</h2>
                <div id="result-placeholder"
                     style="height: 400px; display: flex; justify-content: center; align-items: center; border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px;">
                    <p style="color: rgba(255,255,255,0.4); font-size: 1.2rem;">왼쪽에서 파일을 업로드하면 분석이 시작됩니다.</p>
                </div>
                <div id="result-content" style="display: none; padding: 20px;">
                    <div class="status-header" style="margin-bottom: 20px;">
                        <label style="font-size: 1.2rem; color: #00d1b2; font-weight: bold;">
                            📊 분석 상태: <span id="res-status" style="color:white; margin-left:10px;">완료</span>
                        </label>
                    </div>

                    <div id="res-detail"
                         style="background: rgba(0,0,0,0.4); padding: 25px; border-radius: 15px; min-height: 250px; color: #eee; font-size: 1.1rem; line-height: 1.6; border: 1px solid rgba(0,209,178,0.2); overflow-y: auto;">
                    </div>

                    <p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 20px; font-size: 0.9rem;">
                        ※ 위 내용은 AI 분석 결과이며 실제와 다를 수 있습니다.
                    </p>

                    <div style="display: flex; justify-content: center; margin-top: 15px;">
                        <button type="button" class="hero-btn" onclick="goToDetailPage()" style="min-width: 200px;">
                            자세히 보기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentType = 'image';

    // 1. 탭 전환 함수
    function toggleUploadType(type) {
        currentType = type;
        const imageSection = document.getElementById('image-section');
        const videoSection = document.getElementById('video-section');
        const imageTab = document.getElementById('tab-image');
        const videoTab = document.getElementById('tab-video');

        if (type === 'image') {
            imageSection.style.display = 'block';
            videoSection.style.display = 'none';
            imageTab.classList.add('active');
            videoTab.classList.remove('active');
        } else {
            imageSection.style.display = 'none';
            videoSection.style.display = 'block';
            imageTab.classList.remove('active');
            videoTab.classList.add('active');
        }
    }

    // 2. 미리보기 함수
    function previewFile(type) {
        const input = document.getElementById(type + 'Input');
        const preview = document.getElementById(type + 'Preview');
        const file = input.files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.innerHTML = '';
                if (type === 'image') {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                } else {
                    const video = document.createElement('video');
                    video.src = e.target.result;
                    video.controls = true;
                    preview.appendChild(video);
                }
            }
            reader.readAsDataURL(file);
        }
    }

    // 3. 업로드 및 결과 표시 함수
    function uploadFileWithProgress() {
        const form = document.getElementById('uploadForm');
        const formData = new FormData(form);

        if (currentType === 'image') {
            formData.delete('video_file');
        } else {
            formData.delete('image_file');
        }

        const fileInput = document.getElementById(currentType + 'Input');
        if (!fileInput.files[0]) {
            alert("파일을 선택해주세요!");
            return;
        }

        const xhr = new XMLHttpRequest();
        xhr.addEventListener('load', function() {
            if (xhr.status === 200) {
                try {
                    const response = JSON.parse(xhr.responseText);
                    document.getElementById('result-placeholder').style.display = 'none';
                    document.getElementById('result-content').style.display = 'block';
                    document.getElementById('res-detail').innerText = response.analysis_result || "분석 내용이 없습니다.";
                    alert("분석이 완료되었습니다!");
                } catch (e) {
                    alert("결과 처리 중 오류가 발생했습니다.");
                }
            } else {
                alert("업로드 실패: " + xhr.status);
            }
        });

        xhr.open('POST', '/board/result', true);
        xhr.send(formData);
    }

    // 4. 우클릭 커스텀 메뉴 제어
    const contextMenu = document.getElementById('custom-context-menu');

    document.addEventListener('contextmenu', function(e) {
        const previewBox = e.target.closest('.preview-box');
        if (previewBox) {
            e.preventDefault();
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.pageX + 'px';
            contextMenu.style.top = e.pageY + 'px';
        } else {
            contextMenu.style.display = 'none';
        }
    });

    document.addEventListener('click', function() {
        contextMenu.style.display = 'none';
    });

    function removeSelectedFile() {
        const inputId = currentType === 'image' ? 'imageInput' : 'videoInput';
        const previewId = currentType === 'image' ? 'imagePreview' : 'videoPreview';
        document.getElementById(inputId).value = "";
        const preview = document.getElementById(previewId);
        const placeholderText = currentType === 'image' ? '이미지 미리보기' : '영상 미리보기';
        preview.innerHTML = `<p style="color: rgba(255,255,255,0.3);">${placeholderText}</p>`;
        contextMenu.style.display = 'none';
        alert("선택한 파일이 삭제되었습니다.");
    }

    // 5. 상세 페이지 이동 함수
    function goToDetailPage() {
    const previewId = currentType === 'image' ? 'imagePreview' : 'videoPreview';
    const mediaElement = document.querySelector(`#${previewId} img, #${previewId} video`);

    // 추가: 분석 결과 텍스트가 비어있는지 확인
    const resultText = document.getElementById('res-detail').innerText.trim();

    if (!mediaElement || !resultText) {
        alert("분석이 완료된 후에 상세 보기가 가능합니다.");
        return;
    }

    const analysisData = {
        type: currentType,
        mediaSrc: mediaElement.src,
        memo: document.getElementById('description').value,
        result: resultText
    };

    try {
        localStorage.setItem('temp_analysis_data', JSON.stringify(analysisData));
        location.href = '/analysis';
    } catch (e) {
        console.error("저장 실패:", e);
        alert("파일 용량이 너무 커서 상세 페이지로 이동할 수 없습니다.");
    }
}
</script>

{% endblock %}
