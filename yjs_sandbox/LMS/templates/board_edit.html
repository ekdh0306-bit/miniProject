{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-0">게시글 수정</h3>
    <small class="text-muted">내용을 수정한 뒤 저장하세요.</small>
  </div>
  <a href="/board" class="btn btn-outline-secondary">목록</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    {#
      권장: 컨트롤러에서 board 객체를 조회해 board=board 로 넘기면 가장 깔끔합니다.
      현재 app.py에서는 title/content가 request.form 기반이라 GET에서는 None일 수 있어요.
    #}

    <form method="post" action="">
      <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control" maxlength="200"
               value="{% if board is defined and board %}{{ board.title }}{% else %}{{ title or '' }}{% endif %}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" rows="10" required>{% if board is defined and board %}{{ board.content }}{% else %}{{ content or '' }}{% endif %}</textarea>
      </div>

      <div class="d-flex justify-content-between align-items-center">
        <a href="/board" class="btn btn-light">취소</a>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
