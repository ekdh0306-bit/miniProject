{% extends "menu_layout.html" %}

{% block content %}
<div class="hero-container">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="register-card">
            <h2 class="register-title">
                <a href="/" style="text-decoration: none; color: inherit;">회원가입</a>
            </h2>

            <form action="/join" method="POST" class="register-form">
                <div class="input-group">
                    <label for="uid">아이디</label>
                    <input type="text" id="uid" name="uid" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="input-group">
                    <label for="username">이름</label>
                    <input type="text" id="username" name="username" placeholder="이름을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="pw" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="confirm_password">비밀번호 확인</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="비밀번호를 한 번 더 입력하세요" required>
                </div>

                <button type="submit" class="hero-btn register-submit" style="width: 100%; border: none; margin-top: 10px;">
                    가입하기
                </button>
            </form>

            <p class="login-link" style="margin-top: 20px; text-align: center; color: rgba(255,255,255,0.6);">
                이미 계정이 있으신가요? <a href="/login" style="color: white; font-weight: bold; text-decoration: none;">로그인</a>
            </p>
        </div>
    </div>
</div>

<script>
    document.querySelector('.register-form').addEventListener('submit', function(e) {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        // 1. 비밀번호 일치 확인
        if (password !== confirmPassword) {
            e.preventDefault();
            alert("비밀번호가 일치하지 않습니다. 다시 확인해주세요.");
            document.getElementById('confirm_password').focus();
            return;
        }

        // 2. 일치할 경우 알림 (실제 서버 전송 전)
        // alert("회원가입을 축하합니다! " + username + "님, 환영합니다!");
    });
</script>
{% endblock %}
