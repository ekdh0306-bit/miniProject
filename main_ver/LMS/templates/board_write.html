{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-0">게시글 작성</h3>
    <small class="text-muted">제목과 내용을 입력해 주세요.</small>
  </div>
  <a href="/board" class="btn btn-outline-secondary">목록</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" action="/board/write">
      <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control" maxlength="200" required>
      </div>

      <div class="mb-3">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" rows="10" required></textarea>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <a href="/board" class="btn btn-light">취소</a>
        <button type="submit" class="btn btn-primary">등록</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
