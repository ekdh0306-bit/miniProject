{% extends "menu_layout.html" %}

{% block content %}
<div class="hero-container">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h1 class="welcome-title" style="font-size: 3rem; margin-bottom: 2rem;">글쓰기</h1>

        <div class="main-container" style="max-width: 1000px; flex-direction: column; align-items: stretch; width: 100%; padding: 0 20px;">

            <div style="display: flex; justify-content: flex-start; margin-bottom: 0px;">
                <a href="/board/list" class="hero-btn" style="width: 100px; height: 40px; font-size: 0.9rem; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2);">
                    <i class="bi bi-x-lg"></i> 목록으로
                </a>
            </div>

            <div class="result-card" style="height: auto; padding: 40px; border-radius: 20px; width: 100%; text-align: left;">
                <form action="/board/write_pro" method="POST">

                    <div style="margin-bottom: 25px;">
                        <label style="color: #00d1b2; font-weight: 700; display: block; margin-bottom: 10px; font-size: 1.1rem;">제목</label>
                        <input type="text" name="title" placeholder="제목을 입력해 주세요" required
                               style="width: 100%; height: 55px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
                                      border-radius: 12px; color: white; padding: 0 20px; font-size: 1.2rem; font-family: 'Pretendard';">
                    </div>

                    <div style="margin-bottom: 30px;">
                        <label style="color: #00d1b2; font-weight: 700; display: block; margin-bottom: 10px; font-size: 1.1rem;">내용</label>
                        <textarea name="content" placeholder="내용을 자유롭게 작성해 주세요" required
                                  style="width: 100%; min-height: 400px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
                                         border-radius: 12px; color: white; padding: 20px; font-size: 1.1rem; line-height: 1.6; resize: vertical; font-family: 'Pretendard';"></textarea>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 15px;">
                        <button type="submit" class="hero-btn submit-btn"
                                style="width: 150px; height: 50px; font-size: 1.1rem; font-weight: 700;">
                            등록하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
